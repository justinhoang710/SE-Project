{% extends 'base.html' %}
{% block content %}
<section class="card narrow">
  <div style="display: flex; flex-direction: column; align-items: center; gap: 0.7rem; margin-bottom: 1rem;">
    <img
      src="{{ url_for('static', filename='ModestoLogo.png') }}"
      alt="Modesto Karate logo"
      style="height: 8.8rem; width: auto; border-radius: 0.9rem; border: 1px solid rgba(145, 174, 205, 0.5); background: rgba(255,255,255,0.96); padding: 0.55rem; box-shadow: 0 16px 30px -20px rgba(0,0,0,0.65);"
    />
    <div style="text-align: center; line-height: 1.05;">
      <p style="margin: 0; font-size: 0.82rem; letter-spacing: 0.28em; text-transform: uppercase; color: #9dd7d0; font-weight: 800;">
        Welcome To
      </p>
      <h1 style="margin: 0.15rem 0 0; font-size: clamp(1.9rem, 2.6vw, 2.7rem); font-weight: 900; letter-spacing: -0.03em; color: #ffffff; text-shadow: 0 4px 16px rgba(20, 184, 166, 0.3);">
        Modesto's Karate
      </h1>
      <h1 style="margin: 0; font-size: clamp(1.55rem, 2.1vw, 2.2rem); font-weight: 800; letter-spacing: -0.02em; color: #ffd1bc; text-shadow: 0 4px 14px rgba(255, 107, 45, 0.25);">
        Academies
      </h1>
    </div>
  </div>
  <h2>Sign In</h2>
  <form method="post" style="margin-top: 0.85rem;">
    <label>Username
      <input type="text" name="username" autocomplete="username" required />
    </label>
    <label>Password
      <input type="password" name="password" autocomplete="current-password" required />
    </label>
    <button type="submit">Sign In</button>
  </form>
  <p class="hint" style="margin-top: 0.6rem;">Need an account? <a href="{{ url_for('register') }}">Create one</a></p>
</section>
{% endblock %}
